<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="options.css">
    <title>Fading Days – Settings</title>
</head>

<body>
    <div class="container fade-in">
        <header class="page-header">
            <h1 class="logo">Fading Days</h1>
            <p class="subtitle" data-i18n="optionsTitle"></p>
        </header>

        <!-- Language selector -->
        <section class="section">
            <h2 class="section-title" data-i18n="languageSection"></h2>
            <p class="section-desc" data-i18n="languageDesc"></p>
            <div class="field">
                <label for="languageSelect" class="label" data-i18n="languageLabel"></label>
                <select id="languageSelect" class="input">
                    <!-- Options populated dynamically -->
                </select>
            </div>
        </section>

        <!-- Birth date -->
        <section class="section">
            <h2 class="section-title" data-i18n="birthDateSection"></h2>
            <p class="section-desc" data-i18n="birthDateDesc"></p>
            <div class="field">
                <label for="birthDate" class="label" data-i18n="birthDateLabel"></label>
                <input type="date" id="birthDate" class="input">
            </div>
        </section>

        <!-- Targets -->
        <section class="section">
            <h2 class="section-title" data-i18n="targetsSection"></h2>
            <p class="section-desc" data-i18n="targetsDesc"></p>

            <div id="targetsList" class="targets-list">
                <!-- Targets rendered dynamically -->
            </div>

            <button id="addTarget" class="btn-add">
                <span class="btn-add-icon">+</span>
                <span data-i18n="addTarget"></span>
            </button>
        </section>

        <!-- Support footer -->
        <footer class="support-footer">
            <a href="https://github.com/sojkin/FadingDays" target="_blank" rel="noopener" class="coffee-link">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" style="vertical-align: -2px;">
                    <path
                        d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z" />
                </svg>
                GitHub
            </a>
            <span class="footer-separator">·</span>
            <a href="https://buymeacoffee.com/4dpbvzmph0" target="_blank" rel="noopener" class="coffee-link">
                ☕ <span data-i18n="supportText"></span>
            </a>
        </footer>

        <!-- Save status toast -->
        <div id="saveStatus" class="save-status hidden">
            <span class="save-icon">✓</span>
            <span data-i18n="saved"></span>
        </div>
    </div>

    <script src="options.js" type="module"></script>
</body>

</html>
