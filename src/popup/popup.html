<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=360">
    <link rel="stylesheet" href="popup.css">
    <title>Fading Days</title>
</head>

<body>
    <div id="app" class="fade-in">
        <!-- Header with target navigation -->
        <header class="header">
            <button id="prevTarget" class="nav-arrow" data-i18n-title="prevTarget">‹</button>
            <h1 id="targetName" class="target-name" data-i18n="loading"></h1>
            <button id="nextTarget" class="nav-arrow" data-i18n-title="nextTarget">›</button>
        </header>

        <!-- Empty state (no config) -->
        <div id="emptyState" class="empty-state hidden">
            <p class="empty-text" data-i18n="emptyStateText"></p>
            <button id="openOptionsEmpty" class="btn-options" data-i18n="openOptions"></button>
        </div>

        <!-- Main counter section -->
        <section id="mainSection" class="main-section hidden">
            <div class="counter-container">
                <span id="daysCount" class="days-count">—</span>
                <span class="days-label" data-i18n="daysRemaining"></span>
            </div>

            <!-- Life progress bar -->
            <div id="progressContainer" class="progress-container hidden">
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                    <div class="progress-fade"></div>
                </div>
                <span id="progressText" class="progress-text"></span>
            </div>

            <!-- Metrics grid -->
            <section class="metrics">
                <div class="metric">
                    <span id="weekendsCount" class="metric-value">—</span>
                    <span class="metric-label" data-i18n="weekends"></span>
                </div>
                <div class="metric">
                    <span id="christmasCount" class="metric-value">—</span>
                    <span class="metric-label" data-i18n="christmasEves"></span>
                </div>
                <div class="metric">
                    <span id="easterCount" class="metric-value">—</span>
                    <span class="metric-label" data-i18n="easters"></span>
                </div>
                <div class="metric">
                    <span id="vacationCount" class="metric-value">—</span>
                    <span class="metric-label" data-i18n="vacations"></span>
                </div>
            </section>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <a href="https://buymeacoffee.com/4dpbvzmph0" target="_blank" rel="noopener" class="coffee-link"
                data-i18n-title="supportText">☕</a>
            <button id="openOptions" class="settings-btn" data-i18n-title="settings">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path
                        d="M6.5 1L7.1 3.1C7.4 3.2 7.7 3.3 8 3.5L10 2.6L11.4 4L10.5 6C10.7 6.3 10.8 6.6 10.9 6.9L13 7.5V9.5L10.9 10.1C10.8 10.4 10.7 10.7 10.5 11L11.4 13L10 14.4L8 13.5C7.7 13.7 7.4 13.8 7.1 13.9L6.5 16H4.5L3.9 13.9C3.6 13.8 3.3 13.7 3 13.5L1 14.4L-0.4 13L0.5 11C0.3 10.7 0.2 10.4 0.1 10.1L-2 9.5V7.5L0.1 6.9C0.2 6.6 0.3 6.3 0.5 6L-0.4 4L1 2.6L3 3.5C3.3 3.3 3.6 3.2 3.9 3.1L4.5 1H6.5ZM5.5 6C4.1 6 3 7.1 3 8.5S4.1 11 5.5 11S8 9.9 8 8.5S6.9 6 5.5 6Z"
                        fill="currentColor" transform="translate(2.5, -0.5)" />
                </svg>
            </button>
        </footer>
    </div>

    <script src="popup.js" type="module"></script>
</body>

</html>
